<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Habitese Robot</title>

    <link rel="stylesheet" href="popup.css">

</head>

<body>

    <header class="topo">

        <div>

            <h1>Analises Pendentes</h1>

            <p>Distribuicao automatica por responsavel</p>

        </div>

    </header>

    <section id="resumo" class="resumo" aria-live="polite">

        <div class="resumoItem">

            <span>Pendentes</span>

            <strong id="totalPendentes">0</strong>

        </div>

        <div class="resumoItem resumoDouglas">

            <span>Douglas</span>

            <strong id="totalDouglas">0</strong>

        </div>

        <div class="resumoItem resumoGabriel">

            <span>Gabriel</span>

            <strong id="totalGabriel">0</strong>

        </div>

    </section>

    <nav class="abas" aria-label="Abas da extensão">

        <button id="abaAnalises" type="button" class="aba ativa">

            Análises

        </button>

        <button id="abaNotificacoes" type="button" class="aba">

            Notificações

        </button>

    </nav>

    <section id="viewAnalises" class="viewPainel visivel">

        <section class="controles">

            <button id="btnTabela" type="button">

                Atualizar

            </button>

            <label for="filtroAnalista">

                Analista

            </label>

            <select id="filtroAnalista">

                <option value="">Todos</option>

                <option value="Douglas">Douglas</option>

                <option value="Gabriel">Gabriel</option>

            </select>

        </section>

        <section class="legenda" aria-label="Legenda de responsaveis">

        <span><i class="marcador marcadorDouglas"></i>Douglas</span>

        <span><i class="marcador marcadorGabriel"></i>Gabriel</span>

    </section>

        <p id="mensagem" class="mensagem visivel">

            Clique em Atualizar para carregar as analises.

        </p>

        <div class="tabelaContainer">

            <table id="tblAnalises">

                <thead>

                    <tr>

                        <th>Proprietario</th>

                        <th>Area</th>

                        <th>Uso</th>

                        <th>Tipo</th>

                        <th>Responsavel</th>

                        <th>Acesso</th>

                    </tr>

                </thead>

                <tbody>

                </tbody>

            </table>

        </div>

    </section>

    <section id="viewNotificacoes" class="viewPainel oculto">

        <section class="controles controlesNotificacoes">

            <label for="filtroStatusNotificacoes">

                Status

            </label>

            <select id="filtroStatusNotificacoes">

                <option value="ALL">Todos</option>
                <option value="NEW">Novos</option>
                <option value="PENDING">Aguardando</option>
                <option value="DONE">Concluídos</option>
                <option value="ARCHIVED">Arquivados</option>

            </select>

        </section>

        <div id="listaGruposNotificacoes" class="listaGruposNotificacoes">

        </div>

    </section>

    <script type="module" src="popup.js"></script>

</body>

</html>
